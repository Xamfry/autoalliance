{% extends "base.html" %}

{% block content %}
<div class="page">

    <div class="header">
        <h1>Пользователи</h1>

        <a class="btn gray" href="/admin">
            Назад
        </a>
    </div>

    <div class="card">

        <div class="card-body">

            <form method="post" action="/admin/users/create">

                <div class="form-grid">

                    <input
                        type="text"
                        name="username"
                        placeholder="Логин"
                        required
                    >

                    <input
                        type="password"
                        name="password"
                        placeholder="Пароль"
                        required
                    >

                    <select name="role">
                        <option value="courier">
                            Курьер
                        </option>

                        <option value="admin">
                            Администратор
                        </option>
                    </select>

                    <button class="btn blue" type="submit">
                        Создать
                    </button>

                </div>

            </form>

        </div>

    </div>

    <div class="cards">

        {% for user in users %}
        <div class="card">

            <div class="card-body">

                <div class="card-title">
                    {{ user.username }}
                </div>

                <div class="meta">
                    <b>Роль:</b> {{ user.role }}
                </div>

                <div class="meta">
                    <b>Активен:</b>
                    {% if user.is_active %}
                        Да
                    {% else %}
                        Нет
                    {% endif %}
                </div>

                <form
                    method="post"
                    action="/admin/users/{{ user.id }}/toggle"
                >
                    <button class="btn red" type="submit">

                        {% if user.is_active %}
                            Заблокировать
                        {% else %}
                            Разблокировать
                        {% endif %}

                    </button>
                </form>

            </div>

        </div>
        {% endfor %}

    </div>

</div>
{% endblock %}
